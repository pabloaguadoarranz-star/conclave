backend:
  name: github
  repo: TU_USUARIO/TU_REPOSITORIO   # ← Cambiar por tu usuario y nombre de repo
  branch: main
  auth_type: implicit
  app_id: TU_GITHUB_OAUTH_APP_CLIENT_ID  # ← Cambiar por tu Client ID de GitHub OAuth

locale: es
media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  - name: "contenido"
    label: "Contenido del sitio"
    files:

      - label: "Todo el contenido"
        name: "contenido"
        file: "content.json"
        fields:
          - label: "Meta (SEO)"
            name: "meta"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Título de la página", name: "titulo", widget: "string" }
              - { label: "Descripción (Google)", name: "descripcion", widget: "text" }

          - label: "Hero — Portada"
            name: "hero"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Tagline — palabra 1", name: "tagline_1", widget: "string", hint: "Ej: Comer" }
              - { label: "Tagline — palabra 2", name: "tagline_2", widget: "string", hint: "Ej: Beber" }
              - { label: "Tagline — palabra 3", name: "tagline_3", widget: "string", hint: "Ej: Pecar" }
              - { label: "Subtítulo (cursiva)", name: "subtitulo", widget: "string" }
              - { label: "Texto de apertura", name: "proximamente", widget: "string", hint: "Ej: Próximamente · Barrio del Carme · Valencia" }

          - label: "Sección — El Concepto"
            name: "concepto"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Etiqueta de sección", name: "label", widget: "string" }
              - { label: "Título principal", name: "titulo", widget: "string", hint: "Usa \\n para saltos de línea" }
              - { label: "Primer párrafo", name: "parrafo_1", widget: "text" }
              - { label: "Segundo párrafo", name: "parrafo_2", widget: "text" }
              - { label: "Cita / Definición", name: "definicion", widget: "text" }

          - label: "Sección — Contacto"
            name: "contacto"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Etiqueta de sección", name: "label", widget: "string" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Párrafo introductorio", name: "parrafo", widget: "text" }
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Dirección", name: "direccion", widget: "string" }
              - { label: "Teléfono", name: "telefono", widget: "string" }

          - label: "Sección — Ubicación"
            name: "ubicacion"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Subtítulo", name: "subtitulo", widget: "string" }
              - { label: "URL del mapa (Google Maps embed)", name: "mapa_url", widget: "string" }

          - label: "Footer"
            name: "footer"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Texto de copyright", name: "copyright", widget: "string" }
